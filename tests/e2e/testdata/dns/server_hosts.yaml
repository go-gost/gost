services:
- name: dns
  addr: :1053
  handler:
    type: dns
    metadata:
      # No upstream — host mapper resolves before exchanger is ever reached.
      timeout: 2s
  listener:
    type: dns
  hosts: my-hosts

hosts:
- name: my-hosts
  mappings:
  - ip: 10.0.0.100
    hostname: mapped.example.com
  - ip: 192.168.1.200
    hostname: aaaa.mapped.example.com
