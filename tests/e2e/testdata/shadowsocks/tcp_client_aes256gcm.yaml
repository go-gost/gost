services:
- name: http-proxy
  addr: :8080
  handler:
    type: http
    chain: ss-tcp-chain
  listener:
    type: tcp

chains:
- name: ss-tcp-chain
  hops:
  - name: ss-hop
    nodes:
    - name: ss-node
      addr: {{.ServerAddr}}
      connector:
        type: ss
        auth:
          username: aes-256-gcm
          password: secret
      dialer:
        type: tcp
